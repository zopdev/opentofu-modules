podSecurityPolicy:
  enabled: true
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false
kubeProxy:
  enabled: false
  %{~ if ALERTS_ENABLED ~}
alertmanager:
  %{~ if GRAFANA_HOST != "" ~}
  alertmanagerSpec:
    externalUrl: https://${GRAFANA_HOST}
    %{~ endif ~}
  config:
    global:
      resolve_timeout: 5m
    receivers:
      - name: 'null'
      %{~ if MS_TEAMS_ALERT_ENABLED ~}
      %{~ for k,v in jsondecode(teams_webhook_alerts) ~}
      - name: prometheus-msteams-${k}
        webhook_configs:
          - url: "http://prometheus-msteams:2000/_dynamicwebhook/${v.data}"
            send_resolved: true
      %{~ endfor ~}
      %{~ endif ~}
      %{~ if MOOGSOFT_ALERTS_ENABLED ~}
      %{~ for k,v in jsondecode(cluster_moogsoft_alerts) ~}
      - name: Moogsoft-${k}
        webhook_configs:
          - url: ${v.data}
            http_config:
              basic_auth:
                username: ${MOOGSOFT_USERNAME}
                password: ${MOOGSOFT_ENDPOINT_API_KEY}
      %{~ endfor ~}
      %{~ endif ~}
      %{~ if PAGER_DUTY_ALERTS_ENABLED ~}
      %{~ for k,v in jsondecode(PAGER_DUTY_ENDPOINT_URL) ~}
      - name: Pagerduty-${k}
        pagerduty_configs:
          - service_key: ${PAGER_DUTY_KEY}
            url: ${v.data}
            send_resolved: true
      %{~ endfor ~}
      %{~ endif ~}
      %{~ if GOOGLE_CHAT_ALERTS_ENABLED ~}
      %{~ for k,v in jsondecode(GOOGLE_CHAT_CONFIGS)}
      - name: ${k}
        webhook_configs:
          - url: 'http://calert:6000/dispatch'
            send_resolved: true
      %{~ endfor ~}      
      %{~ endif ~}
      %{~ if SLACK_CHAT_ALERTS_ENABLED ~}
      %{~ for k,v in jsondecode(SLACK_CONFIGS)}
      - name: ${k}
        slack_configs:
          - api_url: ${ v.url }
            channel: ${ v.channel }
            send_resolved: true
      %{~ endfor ~}
      %{~ endif ~}

    route:
      group_by: [ "job", "service", "deployment", "alertname" ]
      group_interval: 5m
      group_wait: 30s
      repeat_interval: 12h
      receiver: 'null'
      routes:
        %{~ for k,v in jsondecode(cluster_teams_alerts) ~}
        - match_re:
            %{~ for n, s in v.labels ~}
            ${n}: ${s}
            %{~ endfor ~}
          continue: true
          receiver: prometheus-msteams-${k}
          %{~ endfor ~}
        %{~ if GOOGLE_CHAT_ALERTS_ENABLED ~}
        %{~ for k,v in jsondecode(GOOGLE_CHAT_CONFIGS)}
        - match_re:
            %{~ for n, s in v.labels ~}
            ${n}: ${s}
            %{~ endfor ~}
          receiver: ${k}
          continue: true
        %{~ endfor ~}
        %{~ endif ~}
    %{~ endif ~}
    %{~ if SLACK_CHAT_ALERTS_ENABLED ~}
      %{~ for k,v in jsondecode(SLACK_CONFIGS)}
        - match_re:
            %{~ for n, s in v.labels ~}
            ${n}: ${s}
            %{~ endfor ~}
          receiver: ${k}
          continue: true
      %{~ endfor ~}
    %{~ endif ~}

grafana:
  enabled: false
prometheus:
  prometheusSpec:
    thanos:
      objectStorageConfig:
        existingSecret:
          name: thanos-objstore-secret
          key: objstore.yaml
      version: v0.34.1
    externalLabels:
      cluster_name: ${CLUSTER_NAME}
    retentionSize: ${PROMETHEUS_RETENTION_SIZE}
    retention: ${PROMETHEUS_RETENTION_DURATION}
    storageSpec:
      ## Using PersistentVolumeClaim
      volumeClaimTemplate:
        spec:
          storageClassName: standard-rwo
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: ${PROMETHEUS_DISK_SIZE}
    remoteWrite:
      %{~ for k,v in jsondecode(REMOTE_WRITE_CONFIGS) ~}
      - url: ${v.host}
        headers:
          ${v.key}: ${v.value}
      %{~ endfor ~}


thanosQuery:
  enabled: true
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8080

thanosStoreGateway:
  enabled: true
  replicaCount: 1
  objectStorageConfig:
    existingSecret:
      name: thanos-objstore-secret
      key: objstore.yaml

thanosCompactor:
  enabled: true
  retentionResolutionRaw: 30d       # Raw samples retention (e.g., 1m)
  retentionResolution5m: 30d        # 5m downsampled data retention
  retentionResolution1h: 60d        # 1h downsampled data retention
  objectStorageConfig:
    existingSecret:
      name: thanos-objstore-secret
      key: objstore.yaml
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
  persistentVolume:
    enabled: true
    size: 10Gi
    storageClass: standard  # Update this if using a different storage class

thanosBucketWeb:
  enabled: true
  objectStorageConfig:
    existingSecret:
      name: thanos-objstore-secret
      key: objstore.yaml