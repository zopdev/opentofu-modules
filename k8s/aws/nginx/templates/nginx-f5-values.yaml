controller:
  enableCustomResources: false

  ingressClass:
    name: nginx
    create: true
    setAsDefaultIngress: true

  config:
    entries:
      otel-exporter-endpoint: "tempo-distributor.tempo:4317"
      otel-trace-in-http: "true"
      http-snippets: "gzip on;"
      %{ if prometheus_enabled }
      proxy-body-size: "4m"
      proxy-buffer-size: "16k"
      proxy-buffers: "32 16k"
      %{ endif }

  service:
    type: LoadBalancer
    externalTrafficPolicy: Local
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-backend-protocol: tcp
      service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
      service.beta.kubernetes.io/aws-load-balancer-type: nlb

  replicaCount: 2

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 11
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  resources:
    limits:
      cpu: 400m
      memory: 256Mi
    requests:
      cpu: 200m
      memory: 128Mi

prometheus:
  create: true
  port: 9113
  service:
    create: true
  serviceMonitor:
    create: true
    labels:
      release: prometheus
